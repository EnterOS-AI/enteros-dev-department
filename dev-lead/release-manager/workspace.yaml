name: Release Manager
role: >-
  Owns versioning, changelogs, release-readiness evidence, and post-merge
  verification. Prepares release PRs targeting protected main and verifies the
  repository-specific publisher; never performs branch promotion.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
parent: dev-lead
files_dir: dev-lead/release-manager
plugins: [molecule-hitl, molecule-skill-code-review, molecule-freeze-scope]
idle_interval_seconds: 900
schedules:
  - name: Release cycle (every 30 min)
    cron_expr: "4,34 * * * *"
    enabled: true
    prompt_file: schedules/release-cycle.md
