name: Infra-SRE
role: >-
  Site reliability engineer. Monitors service health, alerting, incident
  response, status, Gitea Actions, the OCI registry, domain-routed services,
  the off-AWS workspace fleet, and Cloudflare.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
parent: infra-lead
files_dir: dev-lead/infra-lead/infra-sre
plugins: [molecule-hitl, molecule-skill-code-review, molecule-freeze-scope]
channels:
  - type: telegram
    config:
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_id: ${TELEGRAM_CHAT_ID}
    enabled: true
idle_interval_seconds: 900
schedules:
  - name: Pick up work (every 15 min)
    cron_expr: "10,25,40,55 * * * *"
    enabled: true
    prompt_file: schedules/pick-up-work.md
