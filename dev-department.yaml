# Molecule AI — Dev Department subtree manifest
#
# This manifest documents the engineering subtree's defaults and root. Parent
# templates consume workspace roots from this repository with the platform's
# `!external` resolver; see README.md for the import contract.
#
# Hongming-confirmed name: dev-department.yaml (2026-05-08).
# Historical extraction rationale: internal#77.

name: Molecule AI Dev Department
description: >-
  Importable subtree containing the engineering organization: Dev Lead, Core,
  Controlplane, App and Docs, Infrastructure, SDK, release, integration,
  full-stack, documentation, and triage roles.

# These defaults make this manifest self-contained for local validation and
# direct evaluation. A parent `!external` import that targets
# `dev-lead/workspace.yaml` supplies the parent's defaults instead, so parent
# templates must keep their default plugin policy intentionally aligned.
defaults:
  runtime: claude-code
  tier: 2

  plugins:
    - ecc
    - molecule-dev
    - superpowers
    - molecule-careful-bash
    - molecule-prompt-watchdog
    - molecule-audit-trail
    - molecule-session-context
    - molecule-skill-cron-learnings
    - molecule-skill-update-docs
    - molecule-skill-five-axis-review

  # Auditor findings are routed to existing roles by display name.
  category_routing:
    security: [Backend Engineer, DevOps Engineer]
    offensive: [Security Auditor, Backend Engineer, DevOps Engineer]
    ui: [Frontend Engineer]
    ux: [Frontend Engineer]
    infra: [DevOps Engineer, Platform Engineer, SRE Engineer]
    cloud: [DevOps Engineer, Platform Engineer, SRE Engineer, Backend Engineer]
    qa: [QA Engineer]
    performance: [Backend Engineer]
    docs: [Documentation Specialist]
    mixed: [Dev Lead]
    research: [Research Lead]
    plugins: [Technical Researcher]
    template: [Dev Lead]
    channels: [DevOps Engineer]

  idle_prompt: ""

# Workspace children must remain relative-and-down-only. The strict tree
# validator rejects cross-tree traversal and unreachable workspace folders.
roots:
  - !include ./dev-lead/workspace.yaml
