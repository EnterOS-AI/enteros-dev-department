# Gitea Actions CI gate: validate the tree, current operations contract, and
# committed-secret hygiene on every PR and main push.
#
# The validator catches: orphan workspace folders, cross-tree `..`
# traversal in children: paths, duplicate parent claims, missing
# workspace.yaml, generic !include errors.
#
name: Validate dev-department

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # We don't follow submodules. The dev-department subtree is
          # self-contained; cross-repo composition is verified at the
          # parent-template's CI level (internal#77 Phase 4).
          submodules: false

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python3 -m pip install --no-input --disable-pip-version-check pyyaml==6.0.1

      - name: Run contract regression tests
        run: python3 -m unittest discover -s .molecule-ci/tests -p 'test_*.py'

      - name: "Run validator (--strict: hard-fail on cross-tree '..')"
        run: python3 .molecule-ci/scripts/validate-tree.py --strict

      - name: Validate current operations contract
        run: python3 .molecule-ci/scripts/validate-current-ops.py

      - name: Scan committed files for secrets
        run: python3 .molecule-ci/scripts/check-secrets.py
