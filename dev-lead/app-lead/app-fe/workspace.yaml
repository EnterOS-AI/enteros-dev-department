name: App-FE
role: >-
  Frontend engineer for App & Docs team. Owns the app and docs site frontend,
  including navigation, search, builds, accessibility, and the dark zinc theme.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
parent: app-lead
files_dir: dev-lead/app-lead/app-fe
plugins: [molecule-skill-code-review, molecule-skill-llm-judge]
idle_interval_seconds: 900
schedules:
  - name: Pick up work (every 15 min)
    cron_expr: "0,15,30,45 * * * *"
    enabled: true
    prompt_file: schedules/pick-up-work.md
